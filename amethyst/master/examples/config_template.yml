<!DOCTYPE html>
<html>
    <head>
        <!-- Social Site Meta Properties -->
        <meta property="og:title" content="Amethyst">
        <meta property="og:image" content="https://www.amethyst.rs/assets/amethyst.svg">
        <meta property="og:site_name" content="Amethyst">
        <meta property="og:description" content="A data-oriented, data-driven game engine.">
        <meta property="og:url" content="https://www.amethyst.rs/">
        <meta property="og:type" content="website">

        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <meta name="description" content="A data-oriented, data-driven game engine.">
        <meta name="keywords" content="game,engine,data-oriented,data-driven,rust,amethyst">

        <title>Amethyst | Data-oriented and data-driven game engine</title>

        <link rel="shortcut icon" href="/assets/amethyst.ico" />

        <!-- Fonts -->
        <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,400i|Rajdhani:700" rel="stylesheet"> 

        <!-- Stylesheets -->
        <link rel="stylesheet" type="text/css" href="/css/semantic.min.css">
        <link rel="stylesheet" type="text/css" href="/css/main.css">
    </head>

    <body class="site">
        <div class="ui following bar light fixed">
            <div class="ui container">
                <div class="ui large secondary left menu">
                    <!-- Header logo -->
                    <a class="item" href="/">
                        <h3 class="ui header">
                            <img class="ui mini image" src="/assets/amethyst.svg" />
                            <div class="amethyst content">
                                Amethyst
                            </div> 
                        </h3> 
                    </a>

                    <a class="item" href="/doc/">Documentation</a>

                    <!--<a class="item" href="/community/">Community</a>-->

                    <!-- Github link -->
                    <div class="ui right item">
                        <a class="item" href="https://github.com/amethyst/amethyst">
                            <img class="ui mini image noselect" src="/assets/mark-github.svg" />
                        </a>
                    </div>

                </div>
            </div>
        </div>

        <div class="ui main container">
            ---
display: 
    brightness: 1.0
    dimensions: [1024, 768]
    fullscreen: false
    max_dimensions: null
    min_dimensions: null
    multisampling: 0
    title: "Amethyst Game"
    visibility: true
    vsync: true
logging: 
    file_path: "new_project.log"
    logging_level: "debug"
    output_level: "warn"

        </div>

        <div class="ui black inverted vertical footer segment">
            <div class="ui center aligned container">
                <div class="ui stackable center aligned inverted grid">
                    <div class="six wide center aligned column">
                        <h4 class="ui inverted header">Project</h4>
                        <div class="ui inverted link list">
                            <a class="item" href="https://github.com/amethyst/amethyst">Github</a>
                            <a class="item" href="/doc/">Documentation</a>
                        </div>
                    </div>
                    <div class="six wide center aligned column">
                        <h4 class="ui inverted header">Community</h4>
                        <div class="ui inverted link list">
                            <a class="item" href="/feed.xml">RSS Feed</a>
                            <a class="item" href="https://gitter.im/amethyst/general">Gitter Chat</a>
                        </div>
                    </div>
                </div>
                <div class="ui inverted section divider"></div>
                <div clas="ui center aligned container">
                    This website and the Amethyst logo are licensed under a Creative Commons Attribution-ShareAlike 4.0 License.
                </div>
            </div>
        </div>
    </body>
</html>
